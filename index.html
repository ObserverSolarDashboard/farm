<!DOCTYPE html>
<html lang="en" data-theme="dark" data-font="md">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Off-Grid Homestead Blueprint v4.0 — Multi-Region Planning System</title>
<meta name="description" content="Complete off-grid homestead planning for 8 western US locations. Seed vault, livestock, structures, tools, disaster protocols, and resilience systems.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--green:#4ade80;--green-d:#22c55e;--green-bg:rgba(34,197,94,.08);--amber:#fbbf24;--amber-d:#d97706;--amber-bg:rgba(217,119,6,.08);--red:#f87171;--red-d:#ef4444;--red-bg:rgba(239,68,68,.08);--blue:#60a5fa;--blue-d:#3b82f6;--blue-bg:rgba(59,130,246,.08);--purple:#c084fc;--purple-d:#8b5cf6;--purple-bg:rgba(139,92,246,.08);--teal:#2dd4bf;--teal-d:#14b8a6;--teal-bg:rgba(20,184,166,.08);--pink:#f472b6;--rose:#fb7185;--orange:#fb923c;--orange-bg:rgba(251,146,60,.08);--radius:10px;--speed:.18s}
[data-theme="dark"]{--bg0:#06080c;--bg1:#0a0e14;--bg2:#10141c;--bg3:#181d28;--bg4:#222836;--brd:#242a38;--brd2:#343c50;--t1:#e6e8ee;--t2:#97a0b4;--t3:#5e6880;--t4:#3a4258;--overlay:rgba(6,8,12,.92);--banner-g:#0a2016;--banner-b:#0a1224;--banner-a:#1a1408;--banner-p:#120a22;--banner-r:#1a0a0a;--banner-t:#0a221a;--shadow:0 4px 20px rgba(0,0,0,.5);--card-h:var(--bg3);--tip-bg:var(--bg3)}
[data-theme="light"]{--bg0:#f2f4f7;--bg1:#ffffff;--bg2:#edf0f4;--bg3:#e2e5eb;--bg4:#d6dae2;--brd:#ccd0d8;--brd2:#b0b6c2;--t1:#181c26;--t2:#4a5068;--t3:#6b7280;--t4:#98a0b0;--overlay:rgba(242,244,247,.95);--banner-g:#e4f5ec;--banner-b:#e4ecf5;--banner-a:#f5f0e4;--banner-p:#eee4f5;--banner-r:#f5e4e4;--banner-t:#e4f5f0;--shadow:0 2px 12px rgba(0,0,0,.06);--card-h:#d8dce4;--tip-bg:#fef9e6}
[data-font="sm"]{font-size:13px}[data-font="md"]{font-size:15px}[data-font="lg"]{font-size:17px}[data-font="xl"]{font-size:19px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:var(--bg0);color:var(--t1);line-height:1.65;min-height:100vh;transition:background var(--speed),color var(--speed)}
.mono{font-family:'IBM Plex Mono',monospace}
.wrap{max-width:1140px;margin:0 auto;padding:14px 16px 80px}

/* ── TOOLBAR ── */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;padding:10px 14px;background:var(--overlay);border:1px solid var(--brd);border-radius:12px;margin-bottom:14px;position:sticky;top:0;z-index:200;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.tb-g{display:flex;align-items:center;gap:5px}
.tb-l{font-size:.62em;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;font-family:'IBM Plex Mono',monospace}
.tb-b{padding:5px 10px;border-radius:6px;border:1px solid var(--brd);background:var(--bg1);color:var(--t3);font-size:.68em;font-weight:600;cursor:pointer;transition:all .12s;font-family:inherit;white-space:nowrap}
.tb-b:hover{border-color:var(--brd2);color:var(--t2)}
.tb-b.on{background:var(--green-bg);color:var(--green);border-color:rgba(34,197,94,.3)}
.tb-sep{width:1px;height:20px;background:var(--brd);margin:0 2px}
.tb-b.pdf-btn{background:var(--orange-bg);color:var(--orange);border-color:rgba(251,146,60,.3)}
.tb-b.pdf-btn:hover{background:rgba(251,146,60,.15)}

/* ── LOCATION SELECTOR (dropdown on mobile) ── */
.loc-select{display:none}
@media(max-width:900px){.loc-btns{display:none!important}.loc-select{display:block;padding:5px 10px;border-radius:6px;border:1px solid var(--brd);background:var(--bg1);color:var(--t1);font-size:.72em;font-family:inherit;cursor:pointer}}

/* ── HEADER ── */
.header{text-align:center;padding:28px 16px 20px;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--brd),transparent)}
.eyebrow{font-size:.58em;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--green);margin-bottom:8px;font-family:'IBM Plex Mono',monospace}
.header h1{font-size:1.7em;font-weight:800;letter-spacing:-.03em;line-height:1.15;margin-bottom:6px}
.header-sub{font-size:.72em;color:var(--t3);font-weight:400;line-height:1.6}
.loc-pill{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:5px 14px;margin-top:10px;font-size:.68em;color:var(--t2);font-weight:500;transition:all .2s}
.loc-pill strong{color:var(--green);font-weight:700}
.badges{display:flex;justify-content:center;gap:5px;margin-top:10px;flex-wrap:wrap}
.bdg{padding:2px 9px;border-radius:100px;font-size:.56em;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1px solid}
.bdg-g{background:var(--green-bg);color:var(--green);border-color:rgba(34,197,94,.2)}
.bdg-a{background:var(--amber-bg);color:var(--amber);border-color:rgba(217,119,6,.2)}
.bdg-b{background:var(--blue-bg);color:var(--blue);border-color:rgba(59,130,246,.2)}
.bdg-p{background:var(--purple-bg);color:var(--purple);border-color:rgba(139,92,246,.2)}
.bdg-r{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,.2)}
.bdg-t{background:var(--teal-bg);color:var(--teal);border-color:rgba(20,184,166,.2)}
.bdg-o{background:var(--orange-bg);color:var(--orange);border-color:rgba(251,146,60,.2)}

/* ── TABS ── */
.tab-nav{display:flex;gap:1px;overflow-x:auto;border-bottom:1px solid var(--brd);margin:14px 0 22px;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 13px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--t3);font-size:.72em;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .12s;font-family:inherit;border-radius:6px 6px 0 0}
.tab-btn:hover{color:var(--t2);background:var(--bg2)}
.tab-btn.active{color:var(--green);background:var(--bg2);border-bottom-color:var(--green);font-weight:700}
.tp{display:none;animation:fu .2s ease}.tp.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── BANNERS ── */
.ban{border-radius:12px;padding:20px 22px;margin-bottom:20px;border:1px solid;position:relative;overflow:hidden}
.ban::before{content:'';position:absolute;inset:0;opacity:.05;background:radial-gradient(ellipse at 25% 50%,currentColor,transparent 65%);pointer-events:none}
.ban h2{font-size:1.15em;font-weight:800;margin-bottom:4px;position:relative}
.ban p{font-size:.78em;line-height:1.7;opacity:.75;position:relative}
.ban-g{background:var(--banner-g);border-color:rgba(34,197,94,.18);color:var(--green)}
.ban-b{background:var(--banner-b);border-color:rgba(59,130,246,.18);color:var(--blue)}
.ban-a{background:var(--banner-a);border-color:rgba(217,119,6,.18);color:var(--amber)}
.ban-p{background:var(--banner-p);border-color:rgba(139,92,246,.18);color:var(--purple)}
.ban-t{background:var(--banner-t);border-color:rgba(20,184,166,.18);color:var(--teal)}
.ban-r{background:var(--banner-r);border-color:rgba(239,68,68,.18);color:var(--red)}

/* ── EXPANDABLE SECTIONS ── */
.xg{margin-bottom:6px}
.xh{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--radius);cursor:pointer;transition:all .12s;font-family:inherit;text-align:left;color:var(--t1);font-size:.84em;font-weight:600}
.xh:hover{background:var(--card-h);border-color:var(--brd2)}
.xh.open{border-radius:var(--radius) var(--radius) 0 0;border-bottom-color:transparent}
.xh-l{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.xh-i{font-size:1.1em;flex-shrink:0}.xh-s{font-size:.72em;color:var(--t3);font-weight:400;margin-left:4px}
.xh-c{font-size:.68em;color:var(--t3);transition:transform .2s;flex-shrink:0;margin-left:6px}
.xh.open .xh-c{transform:rotate(180deg)}
.xb{display:none;background:var(--bg1);border:1px solid var(--brd);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:16px 18px}
.xb.open{display:block;animation:fu .15s}

/* ── INSTRUCTION STEPS ── */
.ist{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--brd)}
.ist:last-child{border-bottom:none;padding-bottom:0}.ist:first-child{padding-top:0}
.ist-n{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.65em;font-weight:800;flex-shrink:0;font-family:'IBM Plex Mono',monospace}
.ist-c h4{font-size:.88em;font-weight:700;color:var(--t1);margin-bottom:3px}
.ist-c p{font-size:.8em;color:var(--t2);line-height:1.75}
.ist-c strong{color:var(--t1)}
.tip{margin-top:8px;padding:9px 12px;border-radius:7px;background:var(--tip-bg);border-left:3px solid var(--amber);font-size:.75em;color:var(--amber);line-height:1.6}
[data-theme="light"] .tip{color:#7c5a06}

/* ── GRIDS & CARDS ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-bottom:18px}
.card{background:var(--bg2);border-radius:var(--radius);padding:16px;border:1px solid var(--brd);transition:border-color .12s}
.card:hover{border-color:var(--brd2)}
.card h4{font-size:.84em;font-weight:700;margin-bottom:3px}
.card p,.card li{font-size:.78em;color:var(--t2);line-height:1.7}
.igrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:8px;margin-bottom:16px}
.ibox{background:var(--bg2);border-radius:var(--radius);padding:14px;border:1px solid var(--brd)}
.ibox .il{font-size:.6em;text-transform:uppercase;letter-spacing:.06em;font-weight:700;color:var(--t3);margin-bottom:5px;font-family:'IBM Plex Mono',monospace}
.ibox .iv{font-size:.78em;color:var(--t2);line-height:1.7}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:7px;margin-bottom:18px}
.pitem{display:flex;gap:10px;align-items:center;background:var(--bg2);border-radius:var(--radius);padding:10px 12px;border:1px solid var(--brd)}
.pnum{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.95em;flex-shrink:0}
.ptxt h5{font-size:.78em;font-weight:700;color:var(--t1)}.ptxt span{font-size:.62em;color:var(--t3)}

/* ── TABLES ── */
.tw{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--brd);margin-bottom:6px}
.dt{width:100%;border-collapse:collapse;font-size:.74em}
.dt thead th{padding:8px 10px;text-align:left;background:var(--bg3);color:var(--t3);font-weight:600;font-size:.8em;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--brd);white-space:nowrap}
.dt tbody td{padding:8px 10px;border-bottom:1px solid var(--brd);color:var(--t2);vertical-align:top}
.dt tbody tr:last-child td{border-bottom:none}
.dt tbody tr:hover{background:var(--bg3)}
.td-n{color:var(--t1);font-weight:600;white-space:nowrap}
.td-g{color:var(--green)}.td-b{color:var(--blue)}.td-a{color:var(--amber)}.td-p{color:var(--pink)}.td-d{color:var(--t4)}

/* ── MONTH BAR ── */
.mbar{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:14px}
.mb{padding:5px 10px;border-radius:5px;border:1px solid var(--brd);background:var(--bg2);color:var(--t3);font-size:.68em;font-weight:600;cursor:pointer;transition:all .1s;font-family:inherit}
.mb:hover{border-color:var(--brd2)}.mb.on{background:var(--blue-bg);color:var(--blue);border-color:rgba(59,130,246,.3)}
.legend{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:4px}
.leg-d{width:8px;height:8px;border-radius:50%}.leg-t{font-size:.68em;color:var(--t3)}
.ci{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:var(--radius);padding:9px 12px;margin-bottom:4px;border-left:3px solid}
.ci-m{min-width:36px;padding:3px 0;border-radius:4px;background:var(--bg3);text-align:center;font-size:.62em;font-weight:700;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.ci-t{font-size:.78em;color:var(--t2);flex:1}.ci-y{font-size:.54em;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}

/* ── ANIMAL TABS ── */
.atabs{display:flex;gap:6px;margin-bottom:18px}
.atab{flex:1;padding:14px 8px;border-radius:var(--radius);border:1px solid var(--brd);background:var(--bg2);color:var(--t3);font-size:.82em;font-weight:700;text-align:center;cursor:pointer;transition:all .12s;font-family:inherit}
.atab:hover{border-color:var(--brd2)}.atab.on{background:var(--green-bg);color:var(--green);border-color:rgba(34,197,94,.3)}
.atab .ae{font-size:1.6em;display:block;margin-bottom:2px}
.ap{display:none;animation:fu .15s}.ap.on{display:block}

/* ── CALLOUT ── */
.co{border-radius:10px;padding:18px 20px;margin:18px 0;border:1px solid}
.co-g{background:var(--banner-g);border-color:rgba(34,197,94,.18)}
.co-a{background:var(--banner-a);border-color:rgba(217,119,6,.18)}
.co-r{background:var(--banner-r);border-color:rgba(239,68,68,.18)}
.co h4{font-size:.88em;font-weight:700;margin-bottom:6px}.co p{font-size:.78em;line-height:1.8}

/* ── SECTION TITLE ── */
.stitle{font-size:.95em;font-weight:700;color:var(--t1);margin:22px 0 12px;padding-bottom:5px;border-bottom:1px solid var(--brd)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .header h1{font-size:1.3em}.cgrid,.igrid{grid-template-columns:1fr}.pgrid{grid-template-columns:1fr 1fr}
  .atabs{gap:3px}.atab{padding:10px 5px;font-size:.7em}.atab .ae{font-size:1.2em}
  .tab-btn{padding:7px 9px;font-size:.66em}.xh{padding:10px 12px;font-size:.78em}.xb{padding:12px 14px}
  .ban{padding:16px}.igrid{grid-template-columns:1fr}
}
@media(max-width:480px){.pgrid{grid-template-columns:1fr}.wrap{padding:8px 8px 60px}.toolbar{padding:8px}}

/* ── PRINT / PDF ── */
@media print{
  body{background:#fff!important;color:#111!important;font-size:11px!important}
  .toolbar,.tab-nav,.atabs,.mbar,.legend{display:none!important}
  .tp{display:block!important;page-break-inside:avoid}
  .xb{display:block!important;border:1px solid #ccc!important;background:#fafafa!important}
  .xh{background:#eee!important;color:#111!important;border:1px solid #ccc!important;border-radius:4px!important}
  .xh-c{display:none!important}
  .ap{display:block!important}
  .ban{background:#f0f4f0!important;color:#111!important;border:1px solid #aaa!important}
  .ban h2,.ban p{color:#111!important;opacity:1!important}
  .card,.ibox{background:#fafafa!important;border:1px solid #ccc!important}
  .card p,.card li,.ibox .iv,.ist-c p,.co p,.ci-t{color:#333!important}
  .ist-c h4,.card h4,.co h4{color:#111!important}
  .tip{background:#fef9e7!important;color:#7c5a06!important;border-left:3px solid #d97706!important}
  .bdg,.bdg-g,.bdg-a,.bdg-b,.bdg-p,.bdg-r,.bdg-t,.bdg-o{border:1px solid #aaa!important;background:#eee!important;color:#333!important}
  .header::after{display:none}.loc-pill{border:1px solid #aaa!important;background:#eee!important}
  a{color:#1a5276!important}
  .pitem,.ci{background:#fafafa!important;border:1px solid #ccc!important}
  h1,h2,h3,h4{page-break-after:avoid}
  .tp{page-break-before:always}
  .tp:first-child{page-break-before:avoid}
  .stitle{border-bottom:1px solid #aaa!important}
}
</style>
</head>
<body>
<div class="wrap">

<!-- ═══ TOOLBAR ═══ -->
<div class="toolbar">
  <div class="tb-g loc-btns" id="locBtns">
    <span class="tb-l">Loc:</span>
    <button class="tb-b on" onclick="setLoc('boise',this)">Boise ID</button>
    <button class="tb-b" onclick="setLoc('prescott',this)">Prescott AZ</button>
    <button class="tb-b" onclick="setLoc('reno',this)">Reno NV</button>
    <button class="tb-b" onclick="setLoc('redding',this)">Redding CA</button>
    <button class="tb-b" onclick="setLoc('pollock',this)">Pollock Pines CA</button>
    <button class="tb-b" onclick="setLoc('taos',this)">Taos NM</button>
    <button class="tb-b" onclick="setLoc('canon',this)">Cañon City CO</button>
    <button class="tb-b" onclick="setLoc('lonepine',this)">Lone Pine CA</button>
  </div>
  <select class="loc-select" id="locSel" onchange="setLocSel(this)">
    <option value="boise">🏔️ Boise, ID</option>
    <option value="prescott">🏜️ Prescott, AZ</option>
    <option value="reno">🌄 Reno, NV</option>
    <option value="redding">☀️ Redding, CA</option>
    <option value="pollock">🌲 Pollock Pines, CA</option>
    <option value="taos">🏔️ Taos, NM</option>
    <option value="canon">⛰️ Cañon City, CO</option>
    <option value="lonepine">🏜️ Lone Pine, CA</option>
  </select>
  <div class="tb-sep"></div>
  <div class="tb-g">
    <button class="tb-b on" onclick="setTheme('dark')" id="thD">🌙</button>
    <button class="tb-b" onclick="setTheme('light')" id="thL">☀️</button>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-g" id="fontBtns">
    <button class="tb-b" onclick="setFont('sm',this)">A−</button>
    <button class="tb-b on" onclick="setFont('md',this)">A</button>
    <button class="tb-b" onclick="setFont('lg',this)">A+</button>
    <button class="tb-b" onclick="setFont('xl',this)">A++</button>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-b pdf-btn" onclick="exportPDF()">📄 Export PDF</button>
</div>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="eyebrow mono">Off-Grid Homestead Planning System v4.0</div>
  <h1>🌿 Off-Grid Farm Blueprint</h1>
  <div class="header-sub" id="hSub"></div>
  <div id="locPill"></div>
  <div class="badges">
    <span class="bdg bdg-g">Heirloom Seeds</span>
    <span class="bdg bdg-a">Off-Grid Ready</span>
    <span class="bdg bdg-b">Livestock</span>
    <span class="bdg bdg-p">Resilience</span>
    <span class="bdg bdg-r">No Grid</span>
    <span class="bdg bdg-t">8 Locations</span>
    <span class="bdg bdg-o">PDF Export</span>
  </div>
</div>

<!-- ═══ TAB NAV ═══ -->
<div class="tab-nav">
  <button class="tab-btn active" data-tab="overview">🏡 Overview</button>
  <button class="tab-btn" data-tab="seeds">🌱 Seeds</button>
  <button class="tab-btn" data-tab="calendar">📅 Calendar</button>
  <button class="tab-btn" data-tab="animals">🐔 Livestock</button>
  <button class="tab-btn" data-tab="offgrid">⚡ Off-Grid</button>
  <button class="tab-btn" data-tab="structures">🏗️ Structures</button>
  <button class="tab-btn" data-tab="tools">🛠️ Tools</button>
  <button class="tab-btn" data-tab="disaster">🔥 Disaster</button>
  <button class="tab-btn" data-tab="resilience">🛡️ Resilience</button>
</div>

<!-- All tab content will be generated by JavaScript for efficiency -->
<div id="tabContent"></div>

</div><!-- end .wrap -->

<script>
// ═══════════════════════════════════════════════
// LOCATION DATABASE — 8 Locations
// ═══════════════════════════════════════════════
const L={

// ═══ HELPER: Expandable group HTML ═══
function xg(icon,title,sub,content){
  return `<div class="xg"><button class="xh" onclick="tog(this)"><div class="xh-l"><span class="xh-i">${icon}</span> ${title} <span class="xh-s">${sub}</span></div><span class="xh-c">▾</span></button><div class="xb">${content}</div></div>`;
}
function ist(n,color,title,body,tip){
  const bg = color ? `var(--${color}-bg)` : 'var(--bg3)';
  const fg = color ? `var(--${color})` : 'var(--t2)';
  return `<div class="ist"><div class="ist-n" style="background:${bg};color:${fg}">${n}</div><div class="ist-c"><h4>${title}</h4><p>${body}</p>${tip?`<div class="tip">${tip}</div>`:''}</div></div>`;
}

  document.getElementById('solarText').textContent=`Under Davidson's framework, ${d.n} sits on ${d.geo}. Electrical conductivity profile: ${d.cond}. Practical response: design every system for zero-electricity function regardless of conductivity — the hand pump, root cellar, and manual tools work in all scenarios.`;
  // Dynamic content based on location
  const isHot=k==='redding'||k==='lonepine'||k==='reno';

  document.getElementById('z1RabbitHeat').textContent=isHot?`rabbits die at 95°F+. ${d.n} requires shade cloth, frozen water bottles, and evaporative cooling (wet burlap) daily in summer.`:`ensure shade in summer. Frozen water bottles for heat waves.`;

  document.getElementById('z1Water').innerHTML=`Install 2,500+ gal storage (IBC totes on 4-6 ft platform). ${d.n} gets ${d.rain} annual rainfall. ${isDry?'Rainwater is supplemental — well or municipal backup required.':'Good rainfall for rainwater harvesting.'} Install hand pump (Simple Pump or Bison) in existing well. Gravity-fed drip irrigation from elevated tank. Berkey gravity filter for drinking water.`;
  document.getElementById('z1WaterTip').textContent=`Check ${d.n} water rights and regulations before purchasing property. Well permits required in most states.`;

  document.getElementById('z2Berry').textContent=`Plant 20-30 raspberry canes (choose varieties suited to Zone ${d.z.split(' ')[0]}). 6-8 blueberry bushes (amend for acid soil if needed). 4-6 currant bushes. Berries produce Year 2+ for 15-20 years.`;
  document.getElementById('z3Orchard').textContent=`Plant 8-12 dwarf/semi-dwarf fruit trees suited to Zone ${d.z.split(' ')[0]}. Apples (2 for cross-pollination), pears, plums, cherries. Stone fruit if season length allows. Space dwarf 8-10 ft, semi-dwarf 12-15 ft.`;
  document.getElementById('z3FrostTip').textContent=`💡 ${d.n}: protect blooms on frost nights with bedsheets or burlap. A 5-gallon bucket of water under the drape releases heat as it freezes.`;
  document.getElementById('z4Wind').textContent=`Plant windbreak on prevailing wind side. Double row of evergreens (6-8 ft spacing, staggered). Inside row: fast-growing coppice trees for firewood (willow, black locust). Coppice on 3-5 year rotation. Reduces heating fuel 20-40%.`;
  document.getElementById('wowNote').textContent=`In ${d.n}, set Wall-O-Waters 2-3 weeks before ${d.lf} last frost around tomatoes and peppers.`;

// ═══ CONTROLS ═══
function setLoc(k,btn){
  document.querySelectorAll('#locBtns .tb-b').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  document.getElementById('locSel').value=k;
  applyLoc(k);
  try{localStorage.setItem('farm-loc',k)}catch(e){}
}
function setLocSel(sel){setLoc(sel.value,null);document.querySelectorAll('#locBtns .tb-b').forEach(b=>{b.classList.toggle('on',b.textContent.toLowerCase().includes(sel.value.substring(0,4)))})}
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('thD').classList.toggle('on',t==='dark');
  document.getElementById('thL').classList.toggle('on',t==='light');
  try{localStorage.setItem('farm-theme',t)}catch(e){}
}
function setFont(s,btn){
  document.documentElement.setAttribute('data-font',s);
  document.querySelectorAll('#fontBtns .tb-b').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  try{localStorage.setItem('farm-font',s)}catch(e){}
}
function exportPDF(){
  // Open all expandable sections for complete PDF
  document.querySelectorAll('.tp').forEach(p=>p.classList.add('on'));
  document.querySelectorAll('.xh').forEach(h=>{h.classList.add('open');h.nextElementSibling.classList.add('open')});
  document.querySelectorAll('.ap').forEach(p=>p.classList.add('on'));
  setTimeout(()=>window.print(),300);
}

// Tab system
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tp').forEach(p=>p.classList.remove('on'));
    btn.classList.add('active');
    document.getElementById('t-'+btn.dataset.tab).classList.add('on');
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

// Expand/collapse
function tog(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open')}

// Animal tabs
function swA(id,btn){
  document.querySelectorAll('.atab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.ap').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('a-'+id).classList.add('on');
}

buildAll();
buildSeeds();
buildMbar();
buildCal(null);

// Restore preferences
try{
  const st=localStorage.getItem('farm-theme');if(st)setTheme(st);
  const sf=localStorage.getItem('farm-font');if(sf){document.documentElement.setAttribute('data-font',sf);}
  const sl=localStorage.getItem('farm-loc');if(sl&&L[sl])setLoc(sl,null);else applyLoc('boise');
}catch(e){applyLoc('boise');}
